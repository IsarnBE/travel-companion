<article class="folder folder-map">
  <button class="folder-tab" type="button">
    <span class="folder-icon">🗺️</span>

    <span class="folder-title">
      <strong>Mapas</strong>
      <small>Centro de operaciones</small>
    </span>

    <span class="folder-arrow">⌄</span>
  </button>

  <div class="folder-content map-content">
    <div class="map-heading">
      <p class="map-label">Mapa oficial del viaje</p>
      <h3>Peñíscola y alrededores</h3>
      <p>Playas, comida, actividades, supermercados y excursiones.</p>
    </div>

    <!-- Versión para ordenador -->
    <div class="map-desktop">
      <div class="map-frame">
        <iframe
          src="https://www.google.com/maps/d/embed?mid=1As36r0sPnsPbciLy-aY8WuUIRZUlILk"
          title="Mapa de Peñíscola"
          loading="lazy"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <!-- Versión para móvil -->
    <div class="map-mobile">
      <div class="map-mobile-card">
        <span class="map-mobile-icon">🗺️</span>
        <h4>Mapa del viaje</h4>
        <p>Abre el mapa completo para consultar las capas y comenzar una ruta.</p>

        <div class="map-categories">
          <span>🏖️ Playas</span>
          <span>🍽️ Comida</span>
          <span>🎟️ Actividades</span>
          <span>🛒 Compras</span>
          <span>🚗 Aparcamiento</span>
          <span>📍 Lugares</span>
        </div>
      </div>
    </div>

    <a
      class="map-open-button"
      href="https://www.google.com/maps/d/viewer?mid=1As36r0sPnsPbciLy-aY8WuUIRZUlILk"
      target="_blank"
      rel="noopener noreferrer">
      🧭 Abrir mapa completo
    </a>
  </div>
</article>
